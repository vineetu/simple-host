<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Docs — Simple Host</title>
  <script>(function(){try{document.documentElement.dataset.theme=localStorage.getItem('sh-theme')||'dark';}catch(e){document.documentElement.dataset.theme='dark';}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/swagger-ui.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020617;
      --surface: #0b1222;
      --grid: #0f1830;
      --border: #1e293b;
      --border-hi: #334155;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --dim: #475569;
      --accent: #22d3ee;
      --accent-hover: #67e8f9;
      --success: #34d399;
      --error: #fb7185;
      --header-bg: rgba(2,6,23,0.75);
      --on-accent: #020617;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }
    html[data-theme="light"] {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --grid: #e9edf4;
      --border: #e2e8f0;
      --border-hi: #cbd5e1;
      --text: #0f172a;
      --text-secondary: #475569;
      --dim: #94a3b8;
      --accent: #0891b2;
      --accent-hover: #0e7490;
      --success: #059669;
      --error: #e11d48;
      --header-bg: rgba(255,255,255,0.82);
      --on-accent: #ffffff;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 48px 48px;
      background-position: center top;
    }

    .container { max-width: 820px; margin: 0 auto; padding: 0 28px; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 10;
    }
    header .container {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
    }
    .logo {
      font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--text); text-decoration: none;
    }
    .logo b { color: var(--accent); }
    nav.top { display: flex; gap: 22px; font-size: 13px; }
    nav.top a { color: var(--text-secondary); text-decoration: none; transition: color .15s; }
    nav.top a:hover { color: var(--text); }
    nav.top a.current { color: var(--accent); }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      width: 32px; height: 30px; padding: 0;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Page intro ── */
    .page-intro {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
    }
    .eyebrow {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .page-intro h1 {
      font-size: clamp(28px, 4vw, 40px); font-weight: 700;
      letter-spacing: -0.5px; line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-intro h1 .accent { color: var(--accent); }
    .page-intro p {
      color: var(--text-secondary); font-size: 14px; line-height: 1.7;
      max-width: 580px;
    }
    .page-intro p a { color: var(--accent); text-decoration: none; }
    .page-intro p a:hover { text-decoration: underline; }

    /* ── Swagger UI container ── */
    #swagger-ui {
      padding: 32px 0 0;
    }

    /* ── Override Swagger UI to match our design system ── */
    /* Hide default Swagger topbar (already done below via .topbar { display:none }) */
    .topbar { display: none !important; }

    /* Swagger body reset */
    .swagger-ui {
      font-family: var(--mono) !important;
      color: var(--text) !important;
    }
    .swagger-ui .info { margin: 0 0 24px !important; }
    .swagger-ui .info .title,
    .swagger-ui .info h1,
    .swagger-ui .info h2 {
      color: var(--text) !important;
      font-family: var(--mono) !important;
    }
    .swagger-ui .info p,
    .swagger-ui .info li,
    .swagger-ui .info a {
      color: var(--text-secondary) !important;
      font-family: var(--mono) !important;
    }
    .swagger-ui .info a { color: var(--accent) !important; }

    /* Operation blocks */
    .swagger-ui .opblock {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      margin-bottom: 12px !important;
      box-shadow: none !important;
    }
    .swagger-ui .opblock:hover { border-color: var(--border-hi) !important; }
    .swagger-ui .opblock .opblock-summary {
      border: none !important;
      border-radius: 10px !important;
    }
    .swagger-ui .opblock .opblock-summary-method {
      font-family: var(--mono) !important;
      font-weight: 700 !important;
      border-radius: 6px !important;
      min-width: 60px !important;
    }
    .swagger-ui .opblock.opblock-get .opblock-summary-method { background: var(--accent) !important; color: var(--on-accent) !important; }
    .swagger-ui .opblock.opblock-post .opblock-summary-method { background: var(--success) !important; color: #020617 !important; }
    .swagger-ui .opblock.opblock-put .opblock-summary-method { background: #fbbf24 !important; color: #020617 !important; }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: var(--error) !important; color: #020617 !important; }
    .swagger-ui .opblock.opblock-patch .opblock-summary-method { background: #a78bfa !important; color: #020617 !important; }

    .swagger-ui .opblock-summary-path,
    .swagger-ui .opblock-summary-path__deprecated {
      color: var(--text) !important;
      font-family: var(--mono) !important;
      font-size: 14px !important;
    }
    .swagger-ui .opblock-summary-description {
      color: var(--text-secondary) !important;
      font-family: var(--mono) !important;
    }
    .swagger-ui .opblock-body, .swagger-ui .opblock-section {
      background: transparent !important;
    }
    .swagger-ui .opblock-description-wrapper p,
    .swagger-ui .opblock-external-docs-wrapper p,
    .swagger-ui .opblock-tag-section p {
      color: var(--text-secondary) !important;
    }
    .swagger-ui .opblock-tag { border-color: var(--border) !important; }
    .swagger-ui .opblock-tag small { color: var(--text-secondary) !important; }
    .swagger-ui .opblock-tag a { color: var(--text) !important; font-family: var(--mono) !important; }

    /* Params & responses tables */
    .swagger-ui table tbody tr td,
    .swagger-ui table thead tr th {
      color: var(--text) !important;
      border-color: var(--border) !important;
      font-family: var(--mono) !important;
    }
    .swagger-ui .parameter__name { color: var(--accent) !important; }
    .swagger-ui .parameter__type { color: var(--text-secondary) !important; }
    .swagger-ui .parameter__in { color: var(--dim) !important; }

    /* Code / pre blocks inside Swagger.
       Swagger nests the example value as div.highlight-code > pre.microlight >
       code > span. Boxing ALL of pre/code/.microlight stacks borders + padding
       into broken boxes-within-boxes — so box ONLY the outer container and
       flatten everything inside it. */
    .swagger-ui pre,
    .swagger-ui .highlight-code {
      background: #0b1222 !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      color: #f1f5f9 !important;
      font-family: var(--mono) !important;
      padding: 12px 14px !important;
    }
    .swagger-ui .highlight-code pre,
    .swagger-ui .highlight-code .microlight,
    .swagger-ui .highlight-code code {
      background: transparent !important;
      border: 0 !important;
      border-radius: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      color: #f1f5f9 !important;
      font-family: var(--mono) !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
    }
    /* Inline code chips in prose (descriptions) keep a small box. */
    .swagger-ui .markdown code,
    .swagger-ui .renderedMarkdown code {
      background: #0b1222 !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      color: #f1f5f9 !important;
      font-family: var(--mono) !important;
      padding: 2px 6px !important;
    }
    .swagger-ui .model-box { background: var(--surface) !important; }
    .swagger-ui .model { color: var(--text) !important; }
    .swagger-ui .prop-type { color: var(--accent) !important; }
    .swagger-ui .prop-format { color: var(--dim) !important; }

    /* Response code pills */
    .swagger-ui .response-col_status { color: var(--success) !important; font-weight: 600 !important; }

    /* Buttons */
    .swagger-ui .btn {
      font-family: var(--mono) !important;
      border-radius: 8px !important;
    }
    .swagger-ui .btn.execute {
      background: var(--accent) !important;
      color: var(--on-accent) !important;
      border-color: var(--accent) !important;
    }
    .swagger-ui .btn.authorize {
      color: var(--accent) !important;
      border-color: var(--accent) !important;
    }
    .swagger-ui .btn.cancel { border-color: var(--border-hi) !important; color: var(--text-secondary) !important; }

    /* Inputs & selects */
    .swagger-ui input[type=text],
    .swagger-ui input[type=password],
    .swagger-ui input[type=email],
    .swagger-ui textarea,
    .swagger-ui select {
      background: var(--surface) !important;
      border: 1px solid var(--border-hi) !important;
      color: var(--text) !important;
      font-family: var(--mono) !important;
      border-radius: 6px !important;
    }
    .swagger-ui select option { background: var(--surface) !important; color: var(--text) !important; }

    /* Section/scheme select */
    .swagger-ui .scheme-container { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; padding: 16px !important; }

    /* Markdown in descriptions */
    .swagger-ui .markdown p,
    .swagger-ui .markdown li { color: var(--text-secondary) !important; font-family: var(--mono) !important; }
    .swagger-ui .markdown code { padding: 2px 6px !important; }

    /* Arrow/expand icons */
    .swagger-ui .arrow { filter: invert(0.6) !important; }

    /* Light theme: soften swagger to match */
    html[data-theme="light"] .swagger-ui .opblock {
      background: #ffffff !important;
      border-color: var(--border) !important;
    }
    html[data-theme="light"] .swagger-ui pre,
    html[data-theme="light"] .swagger-ui .highlight-code {
      background: #f1f5f9 !important;
      border-color: var(--border) !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] .swagger-ui .highlight-code pre,
    html[data-theme="light"] .swagger-ui .highlight-code .microlight,
    html[data-theme="light"] .swagger-ui .highlight-code code {
      background: transparent !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] .swagger-ui .markdown code,
    html[data-theme="light"] .swagger-ui .renderedMarkdown code {
      background: #f1f5f9 !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] .swagger-ui .model-box { background: #f7f8fb !important; }
    html[data-theme="light"] .swagger-ui table tbody tr td,
    html[data-theme="light"] .swagger-ui table thead tr th { color: #0f172a !important; }
    html[data-theme="light"] .swagger-ui .scheme-container { background: #ffffff !important; }
    html[data-theme="light"] .swagger-ui input[type=text],
    html[data-theme="light"] .swagger-ui input[type=password],
    html[data-theme="light"] .swagger-ui input[type=email],
    html[data-theme="light"] .swagger-ui textarea,
    html[data-theme="light"] .swagger-ui select { background: #f7f8fb !important; }
    html[data-theme="light"] .swagger-ui .arrow { filter: none !important; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 26px 0;
      font-size: 12px;
      color: var(--dim);
      margin-top: 48px;
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      nav.top { gap: 14px; }
      .page-intro { padding: 32px 0 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a class="logo" href="/">simple<b>·</b>host</a>
      <div style="display:flex;align-items:center;gap:18px">
        <nav class="top">
          <a href="/">Home</a>
          <a href="/install.html">Get started</a>
          <a href="/docs.html" class="current">API</a>
          <a href="/architecture.html">Architecture</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.1 5.1l1.4 1.4M17.5 17.5l1.4 1.4M18.9 5.1l-1.4 1.4M6.5 17.5l-1.4 1.4"/></svg></button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-intro">
        <div class="eyebrow">API Reference</div>
        <h1>Simple Host <span class="accent">REST API</span></h1>
        <p>Full machine-readable spec: <a href="/openapi.yaml">/openapi.yaml</a> &middot; <a href="/openapi.json">/openapi.json</a> &middot; <a href="/llms.txt">/llms.txt</a></p>
      </div>
      <div id="swagger-ui"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      simple·host &nbsp;·&nbsp; <a href="/">Home</a> &nbsp;·&nbsp; <a href="/install.html">Get started</a> &nbsp;·&nbsp; <a href="/docs.html">API reference</a> &nbsp;·&nbsp; With thanks to Jacob Cole and Tejas D Channappa.
    </div>
  </footer>

  <script src="/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: '/openapi.yaml',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
    });
  </script>
  <script>
    (function(){var btn=document.getElementById('theme-toggle');if(!btn)return;var SUN='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.1 5.1l1.4 1.4M17.5 17.5l1.4 1.4M18.9 5.1l-1.4 1.4M6.5 17.5l-1.4 1.4"/></svg>';var MOON='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';var paint=function(){btn.innerHTML=document.documentElement.dataset.theme==='dark'?SUN:MOON;};paint();btn.addEventListener('click',function(){var t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;try{localStorage.setItem('sh-theme',t);}catch(e){}paint();});})();
  </script>
</body>
</html>
