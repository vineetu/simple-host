# v3 content host: serve all user sites by PATH under one origin.
#   https://sites.simple-host.app/<handle>/<site>/<rest>
#     -> /srv/simple-host/sites/handles/<handle>/<site>/current/<rest>
# (symlink farm: handles/<handle> -> by-id/<user_id> -> <site> dir)
# Exact server_name wins over the per-site regex block, so sites.simple-host.app
# routes here instead of trying to serve a site literally named "sites".
server {
    listen 443 ssl;
    server_name sites.simple-host.app;

    ssl_certificate     /etc/letsencrypt/live/simple-host.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simple-host.app/privkey.pem;

    # API + internal endpoints proxy to the app (same-origin state/collections).
    # ^~ so these win over the regex path-serving locations below.
    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /internal/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare /<handle>/<site> -> add trailing slash so relative links resolve.
    location ~ "^/([a-z0-9-]{1,39})/([a-z0-9-]{1,63})$" {
        return 308 $scheme://$host$request_uri/;
    }

    # /<handle>/<site>/<rest> -> the farm.
    location ~ "^/(?<h>[a-z0-9-]{1,39})/(?<s>[a-z0-9-]{1,63})(?<rest>/.*)?$" {
        alias /srv/simple-host/sites/handles/$h/$s/current$rest;
        index index.html;
    }

    # Bare content-host root is not a site.
    location = / { return 404; }
}
