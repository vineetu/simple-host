# v3 content host: serve all user sites by PATH under one origin.
#   https://sites.simple-host.app/<handle>/<site>/<rest>
#     -> /srv/simple-host/sites/handles/<handle>/<site>/current/<rest>
# (symlink farm: handles/<handle> -> by-id/<user_id> -> <site> dir)
# Exact server_name wins over the per-site regex block, so sites.simple-host.app
# routes here instead of trying to serve a site literally named "sites".
server {
    listen 443 ssl;
    server_name sites.simple-host.app;

    ssl_certificate     /etc/letsencrypt/live/simple-host.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simple-host.app/privkey.pem;

    # API + internal endpoints proxy to the app (same-origin state/collections).
    # ^~ so these win over the regex path-serving locations below.
    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /internal/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare /<handle>/<site> -> add trailing slash so relative links resolve.
    location ~ "^/([a-z0-9-]{1,39})/([a-z0-9-]{1,63})$" {
        return 308 $scheme://$host$request_uri/;
    }

    # /<handle>/<site>/<rest> -> the farm. A missing site dir or asset 404s, which
    # we hand to the app for a branded 404 (back-link to the user's showcase).
    location ~ "^/(?<h>[a-z0-9-]{1,39})/(?<s>[a-z0-9-]{1,63})(?<rest>/.*)?$" {
        alias /srv/simple-host/sites/handles/$h/$s/current$rest;
        index index.html;
        error_page 404 = @notfound;
    }

    # Single-segment /<handle> (and /<handle>/) -> the user's public showcase,
    # rendered by the app. Two-segment paths match above; ^~ /v1/ and /internal/
    # win over this regex, so those are unaffected.
    location ~ "^/(?<sh>[a-z0-9-]{1,39})/?$" {
        access_log off;
        proxy_pass http://127.0.0.1:8090/internal/showcase/$sh;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Branded 404 for file misses above: the app reads X-Original-URI and points
    # the back-link at the user's showcase when the handle is real, else the main
    # page. proxy_intercept_errors stays off so the app's 404 passes through.
    location @notfound {
        internal;
        access_log off;
        proxy_pass http://127.0.0.1:8090/internal/notfound;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }

    # Bare content-host root is not a site -> branded 404 back to the main page.
    location = / {
        access_log off;
        proxy_pass http://127.0.0.1:8090/internal/notfound;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI /;
    }
}
