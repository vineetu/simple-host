# Custom domain -> the one site it is bound to. Content served from the domains
# farm: domains/<domain> -> by-id/<user_id>/<site>. /v1 + /internal proxy to the app
# (^~ so they win over any path regex). Same-origin state API.
server {
    listen 443 ssl;
    server_name agent-deploy.dev;

    ssl_certificate     /etc/letsencrypt/live/agent-deploy.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent-deploy.dev/privkey.pem;

    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /internal/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /srv/simple-host/sites/domains/agent-deploy.dev/current;
    index index.html;
    location / { try_files $uri $uri/ =404; }
}
# Redirect http -> https for the custom domain (keep the acme-challenge path working).
server {
    listen 80;
    server_name agent-deploy.dev;
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://$host$request_uri; }
}
